name: Footfall Data (Historical & Current)

on:
  schedule:
    - cron: '0 6 * * *'  # 6AM UTC daily
  workflow_dispatch:      # Manual trigger

jobs:
  fetch-footfall:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: pip install requests
    
    - name: Run historical footfall script
      run: python footfall_historical.py
    
    - name: Run current footfall script
      run: python footfall_current.py
    
    - name: Commit all data changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/footfall_*.json
        git diff --staged --quiet || git commit -m "Update footfall data: historical & current periods $(date +%Y-%m-%d)"
        git push
